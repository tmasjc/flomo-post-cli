name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # mints the OIDC token npm exchanges for publish rights

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # trusted publishing requires Node >= 22.14.0
          registry-url: https://registry.npmjs.org
          cache: npm

      # Node 22 ships npm 10.x; trusted publishing needs npm >= 11.5.1.
      - run: npm install -g npm@latest

      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "Tag v$tag does not match package.json version $pkg" >&2
            exit 1
          fi

      - run: npm run typecheck

      - run: npm test

      # No NODE_AUTH_TOKEN: auth comes from OIDC via the trusted publisher
      # configured on npmjs.com. Provenance is generated automatically, so
      # --provenance is not passed.
      - run: npm publish
