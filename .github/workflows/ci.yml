name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# A new push to the same branch supersedes any run still in flight.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # vitest 4 requires ^20 || ^22 || >=24, so the suite cannot run on
        # Node 18. The engines floor is covered by the `compat` job below.
        node: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

  compat:
    name: engines floor (node 18)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Build on a version the toolchain supports...
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      # ...then run the built artifact on the oldest version package.json
      # claims to support. Guards against shipping syntax or APIs newer than
      # the declared engines range.
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Built CLI runs on the declared engines floor
        run: |
          node --version
          node dist/cli.js --version
          node dist/cli.js --help > /dev/null
